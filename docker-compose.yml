version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satkerKemenag_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./php-custom.ini:/usr/local/etc/php/conf.d/uploads.ini
    extra_hosts:                                   
      - "host.docker.internal:host-gateway"        
    networks:
      - satkerKemenag_net

  web:
    image: nginx:alpine
    container_name: satkerKemenag_web
    ports:
      - "8092:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    depends_on:
      - app
    networks:
      - satkerKemenag_net

  db:
    image: postgres:15
    container_name: satkerKemenag_db
    environment:
      POSTGRES_DB: satkerKemenag
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5439:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - satkerKemenag_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: satkerKemenag_queue
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    extra_hosts:                                 
      - "host.docker.internal:host-gateway"        
    depends_on:
      - app
      - db
    networks:
      - satkerKemenag_net

networks:
  satkerKemenag_net:

volumes:
  db_data: